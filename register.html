<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - LIGHT'S DRUMMING ACADEMY</title>

  <style>
    body {
      background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnPuu0c0AvFJoas9y_lwRSH-XUNtGpkRHx9xIGQLPbSS0e2NTjrQrIGvmU&s=10');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      color: white;
      font-family: Arial, sans-serif;
      padding: 1rem;
      font-size: 50px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    hr {
      border: none;
      border-top: 5px dotted white;
      width: 5%;
      margin: 2rem auto;
    }

    .register-form {
      background-color: rgba(0, 0, 0, 0.7);
      padding: 25px;
      border-radius: 12px;
      max-width: 950px;
      font-size: 10px;
      font-stretch: 50px;
      margin: auto;
      color: white;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .register-form label {
      display: block;
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      color: black;
    }

    textarea {
      resize: vertical;
    }

    button {
      background-color: black;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: white;
      color: black;
      box-shadow: 0 0 10px white;
      transform: scale(1.05);
    }

    a {
      color: white;
      text-decoration: none;
    }

    a:hover {
      color: #FFD700;
      text-shadow: 0 0 5px #FFD700;
    }
  </style>
</head>

<body>
  <h1>Registration Form</h1>

  <form class="register-form" action="success.html" method="get">

    <!-- Text -->
    <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" name="fullname" required />

    <!-- Email -->
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required />

    <!-- Tel -->
    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" />

    <!-- Password -->
    <label for="password">Create a Password:</label>
    <input type="password" id="password" name="password" />

    <!-- Number -->
    <label for="age">Your Age:</label>
    <input type="number" id="age" name="age" min="10" max="100" />

    <!-- Range -->
    <label for="volume">Drumming Intensity (1–10):</label>
    <input type="range" id="volume" name="volume" min="1" max="10" />

    <!-- Date -->
    <label for="startdate">Preferred Start Date:</label>
    <input type="date" id="startdate" name="startdate" />

    <!-- Time -->
    <label for="preferred-time">Preferred Lesson Time:</label>
    <input type="time" id="preferred-time" name="preferred-time" />

    <!-- Radio -->
    <label>Skill Level:</label>
    <input type="radio" id="beginner" name="skill" value="beginner" />
    <label for="beginner" style="display: inline;">Beginner</label><br>
    <input type="radio" id="intermediate" name="skill" value="intermediate" />
    <label for="intermediate" style="display: inline;">Intermediate</label><br>
    <input type="radio" id="advanced" name="skill" value="advanced" />
    <label for="advanced" style="display: inline;">Advanced</label><br><br>

    <!-- Checkbox -->
    <label>
      <input type="checkbox" name="subscribe" checked />
      Subscribe me to email updates
    </label><br><br>

    <!-- Color -->
    <label for="color">Favorite Drum Color:</label>
    <input type="color" id="color" name="color" />

    <!-- File -->
    <label for="profile">Upload a Profile Photo:</label>
    <input type="file" id="profile" name="profile" />

    <!-- URL -->
    <label for="website">Personal Website or Social Link:</label>
    <input type="url" id="website" name="website" />

    <!-- Textarea -->
    <label for="message">Why Do You Want to Join?</label>
    <textarea id="message" name="message" rows="4" placeholder="Share your heart and rhythm..."></textarea>

    <!-- Submit -->
    <button type="submit">Register</button>
  </form>

  <p style="text-align: center; margin-top: 2rem;">
    <a href="index.html">← Back to Home</a>
  </p>
</body>
</html>
