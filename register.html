<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - LIGHT'S DRUMMING ACADEMY</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 2rem;">
  <h1 style="text-align: center;">Registration Form</h1>

  <form action="success.html" method="get" style="max-width: 600px; margin: auto; background-color: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.2);">

    <!-- Text -->
    <label for="fullname">Full Name:</label><br>
    <input type="text" id="fullname" name="fullname" required><br><br>

    <!-- Email -->
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <!-- Tel -->
    <label for="phone">Phone Number:</label><br>
    <input type="tel" id="phone" name="phone"><br><br>

    <!-- Password -->
    <label for="password">Create a Password:</label><br>
    <input type="password" id="password" name="password"><br><br>

    <!-- Number -->
    <label for="age">Your Age:</label><br>
    <input type="number" id="age" name="age" min="10" max="100"><br><br>

    <!-- Range -->
    <label for="volume">Drumming Intensity (1–10):</label><br>
    <input type="range" id="volume" name="volume" min="1" max="10"><br><br>

    <!-- Date -->
    <label for="startdate">Preferred Start Date:</label><br>
    <input type="date" id="startdate" name="startdate"><br><br>

    <!-- Time -->
    <label for="preferred-time">Preferred Lesson Time:</label><br>
    <input type="time" id="preferred-time" name="preferred-time"><br><br>

    <!-- Radio -->
    <label>Skill Level:</label><br>
    <input type="radio" id="beginner" name="skill" value="beginner">
    <label for="beginner">Beginner</label><br>
    <input type="radio" id="intermediate" name="skill" value="intermediate">
    <label for="intermediate">Intermediate</label><br>
    <input type="radio" id="advanced" name="skill" value="advanced">
    <label for="advanced">Advanced</label><br><br>

    <!-- Checkbox -->
    <label>
      <input type="checkbox" name="subscribe" checked>
      Subscribe me to email updates
    </label><br><br>

    <!-- Color -->
    <label for="color">Favorite Drum Color:</label><br>
    <input type="color" id="color" name="color"><br><br>

    <!-- File -->
    <label for="profile">Upload a Profile Photo:</label><br>
    <input type="file" id="profile" name="profile"><br><br>

    <!-- URL -->
    <label for="website">Personal Website or Social Link:</label><br>
    <input type="url" id="website" name="website"><br><br>

    <!-- Textarea -->
    <label for="message">Why Do You Want to Join?</label><br>
    <textarea id="message" name="message" rows="4" cols="50" placeholder="Share your heart and rhythm..."></textarea><br><br>

    <!-- Submit -->
    <button type="submit" style="padding: 10px 20px; background-color: black; color: white; border: none; border-radius: 6px;">Register</button>
  </form>
<p style="text-align: center; margin-top: 2rem;">
  <p style="text-align:center; margin-top: 2rem;"><a href="index.html">← Back to Home</a></p>
</body>
</html>
